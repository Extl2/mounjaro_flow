<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンライン診察のご案内</title>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:#f7f8fc;
  margin:0;
  padding:24px;
  color:#1f2937;
}
.wrap{
  max-width:560px;
  margin:0 auto;
}
.card{
  background:#ffffff;
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 24px rgba(16,24,40,.08);
}
h1{
  font-size:24px;
  margin-top:0;
}
.notice{
  background:#ecfdf3;
  border:1px solid #abefc6;
  border-radius:12px;
  padding:14px;
  margin-top:14px;
  font-size:14px;
}
.btn{
  display:block;
  width:100%;
  text-align:center;
  text-decoration:none;
  border:none;
  border-radius:14px;
  padding:16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  background:#06c755;
  color:#fff;
  margin-top:20px;
}
.small{
  font-size:13px;
  color:#6b7280;
  margin-top:14px;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <h1>オンライン診察のご案内</h1>

    <p>
    ご予約ありがとうございます。<br>
    診察は <strong>Google Meetによるビデオ診察</strong> で行います。
    </p>

    <div class="notice">
    診察時間の<strong>10分前までに</strong><br>
    Google Meetの診察URLを<strong>LINEでお送りします</strong>。
    </div>

    <p class="small">
    診察開始前にLINEをご確認ください。<br>
    ご不明点がある場合もLINEからご連絡いただけます。
    </p>

    <a class="btn" href="https://lin.ee/nSBG5aT" target="_blank" rel="noopener noreferrer">
      LINEを開く
    </a>

    <p class="small">
    ※通信環境の良い場所でお待ちください。<br>
    ※診察時間は約5分程度です。<br>
    ※診察の結果により処方できない場合があります。
    </p>

  </div>
</div>

</body>
</html>
